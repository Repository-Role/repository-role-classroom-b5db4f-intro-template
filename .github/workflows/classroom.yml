name: Autograding Testsa
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: aaa
      id: aaa
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: aaa
        setup-command: ''
        command: "./a.sh"
        input: 1+1
        expected-output: 'bbb'
        comparison-method: contains
        timeout: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        AAA_RESULTS: "${{steps.aaa.outputs.result}}"
      with:
        runners: aaa
